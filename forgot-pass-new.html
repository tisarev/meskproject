<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">

    <link href="./assets/css/normalize.css" rel="stylesheet" type="text/css">
    <link href="./assets/css/style.css?v=1.0" rel="stylesheet" type="text/css">

    <script src="./components/my-infoblock.js" defer></script>
    <script src="./components/my-footer.js" defer></script>

    <title>Восстановление доступа - новый пароль</title>
</head>
<body>
    <div class="body-fon">
        <main>
            <div class="container container-flex">
                <div class="body-fon__content">
                    <div class="logo">
                        <img src="./assets/img/logo.jpg">
                    </div>
                    <h1>Восстановление доступа</h1>
                    <p>Придумайте новый пароль</p>
                    <br>
                    <form action="" method="get">
                        <div class="input-group">
                            <label for="password1">Новый пароль</label>
                            <div class="input-wrapper">
                                <input type="password" id="password1" required>
                                <button type="button" class="toggle-password">
                                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                                    <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
                                    <circle class="eye-open" cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                                    <path class="eye-closed" style="display:none" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="2"/>
                                    <line class="eye-closed" style="display:none" x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="password2">Новый пароль повторно</label>
                            <div class="input-wrapper">
                                <input type="password" id="password2" required>
                                <button type="button" class="toggle-password">
                                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                                    <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
                                    <circle class="eye-open" cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                                    <path class="eye-closed" style="display:none" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="2"/>
                                    <line class="eye-closed" style="display:none" x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="button-group">
                            <button type="submit" class="btn-primary">Обновить</button>
                        </div>
                    </form>
                </div>
                <my-infoblock></my-infoblock>
            </div>
        </main>
        <div class="footer">
            <div class="container">
                <my-footer></my-footer>
            </div>
        </div>
    </div>
    <script src="./assets/js/main.js" defer></script>
</body>
</html>
