<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">

    <link href="./assets/css/normalize.css" rel="stylesheet" type="text/css">
    <link href="./assets/css/style.css?v=1.0" rel="stylesheet" type="text/css">

    <script src="./components/my-infoblock.js" defer></script>
    <script src="./components/my-footer.js" defer></script>

    <title>Главная</title>
</head>
<body>
    <div class="body-fon">
        <main>
            <div class="container container-flex">
                <div class="body-fon__content">
                    <div class="logo">
                        <img src="./assets/img/logo.jpg">
                    </div>
                    <h1>Заполнение данных для формирования заявки на заключение договора</h1>
                    <p><a href="./login.html"><b>Вернуться назад</b></a></p>
                    <form action="" method="get">
                        <div class="form-toggle" data-toggle-group="entityType">
                            <div class="form-toggle_item">
                                <input type="radio" id="radio-legal-entity" name="face" value="radio-legal-entity" checked>
                                <label for="radio-legal-entity">Юридическое лицо</label>
                            </div>
                            <div class="form-toggle_item">
                                <input type="radio" id="radio-individual" name="face" value="radio-individual">
                                <label for="radio-individual">Физическое лицо или ИП</label>
                            </div>
                        </div>
                        <div data-toggle-target="entityType" data-toggle-value="radio-legal-entity">
                            <div class="form-group">
                                <div class="input-group">
                                    <label for="inn">ИНН</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="inn" name="inn" inputmode="numeric" pattern="\d{10}|\d{12}" maxlength="12" placeholder="10 или 12 цифр" required>
                                    </div>
                                </div>
                                <div class="input-group ">
                                    <label for="kpp">КПП</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="kpp" name="kpp" inputmode="numeric" pattern="\d{9}" maxlength="9" placeholder="9 цифр" required>
                                    </div>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="post-title">Название</label>
                                <div class="input-wrapper disabled">
                                    <input type="text" id="post-title" value="ООО “Спорткомлекс Ленинский”" disabled required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="post-legal-address">Юридический адрес</label>
                                <div class="input-wrapper disabled">
                                    <input type="text" id="post-legal-address" value="РМ, пос. Атяшево, Ленина 133" disabled required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="post-fact-address">Фактический адрес</label>
                                <div class="input-wrapper">
                                    <input type="text" id="post-fact-address" value=" 430016, Республика Мордовия, город Саранск, Большевистская ул, д. 117а ">
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="post-ogrn">ОГРН</label>
                                <div class="input-wrapper disabled">
                                    <input type="text" id="post-ogrn" value="1081326002988" disabled required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="post-director">Руководитель</label>
                                <div class="input-wrapper">
                                    <input type="text" id="post-director" value="Лялькин Виталий Александрович" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="post-based-what">На основании чего директор</label>
                                <div class="input-wrapper">
                                    <input type="text" id="post-based-what" value="" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="input-group">
                                    <label for="bank-bik">БИК Банка</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="bank-bik">
                                    </div>
                                </div>
                                <div class="input-group input-group-2">
                                    <label for="bank-name">Название банка</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="bank-name">
                                    </div>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="payment-account">Расчетный счёт в банке</label>
                                <div class="input-wrapper">
                                    <input type="text" id="payment-account" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="corp-account">Корреспондентский счёт банка</label>
                                <div class="input-wrapper">
                                    <input type="text" id="corp-account" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="type-agreement">Тип договора</label>
                                <div class="select-wrapper">
                                    <select class="custom-select" id="type-agreement">
                                    <option value="" disabled selected>Выберите из списка</option>
                                    <option value="1">Договор 1</option>
                                    <option value="2">Договор 2</option>
                                    <option value="3">Договор 3</option>
                                    <option value="4">Договор 4</option>
                                    <option value="4">Договор 5</option>
                                    </select>

                                    <!-- Наша иконка стрелки (SVG) -->
                                    <svg class="custom-arrow" viewBox="0 0 24 24">
                                    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                                    </svg>
                                </div>
                            </div>

                            <div class="checkbox-group">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox">
                                    <span class="custom-checkbox"></span>
                                    <span class="label-text">
                                        Я даю свое согласие на обработку моих персональных данных. <a href="#">Политика в отношении обработки персональных данных</a>.
                                    </span>
                                </label>
                                <label class="checkbox-wrapper">
                                    <input type="checkbox">
                                    <span class="custom-checkbox"></span>
                                    <span class="label-text">
                                        Я ознакомлен с <a href="#">пользовательским соглашением</a>.
                                    </span>
                                </label>
                            </div>
                            <div class="button-group">
                                <button type="submit" class="btn-primary">Зарегистрироваться</button>
                            </div>
                        </div>
                        <div data-toggle-target="entityType" data-toggle-value="radio-individual">
                            <div class="input-group">
                                <label for="inn2">ИНН</label>
                                <div class="input-wrapper">
                                    <input type="text" id="inn2" name="inn" inputmode="numeric" pattern="\d{10}|\d{12}" maxlength="12" placeholder="10 или 12 цифр" required>
                                </div>
                            </div>
                            <fieldset>
                            <legend>Паспортные данные</legend>
                            <div class="form-group">
                                <div class="input-group">
                                    <label for="text-surname">Фамилия</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="text-surname" required>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label for="text-name">Имя</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="text-name" required>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label for="texxtpatronymic">Отчество</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="text-patronymic" required>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="input-group">
                                    <label for="text-seria">Серия</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="text-seria" required>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label for="text-namber">Номер</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="text-namber" required>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label for="texxtcalendardate">Дата выдачи</label>
                                    <div class="input-wrapper">
                                        <input type="date" class="custom-date-input" id="text-calendardate" value="2026-07-13" required>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="input-group input-group-2">
                                    <label for="text-cembidan">Кем выдан</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="text-cembidan">
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label for="text-codehome">Код подразделения</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="text-codehome" required>
                                    </div>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="text-registration-address">Адрес регистрации</label>
                                <div class="input-wrapper">
                                    <input type="text" id="text-registration-address" required>
                                </div>
                            </div>
                            </fieldset>
                            <div class="form-group">
                                <div class="input-group">
                                    <label for="mail-person">Эл. почта ответственного лица</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="mail-person" required>
                                    </div>
                                </div>
                                <button class="btn-secondary" style="width: 200px;">Подтвердить почту</button>
                            </div>
                            <div class="form-group">
                                <div class="input-group">
                                    <label for="tel-person">Телефон ответственного лица (мобильный)</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="tel-person" required>
                                    </div>
                                    <small class="hint">На этот номер придет проверочный код</small>
                                </div>
                                <button class="btn-secondary" style="width: 200px;">Подтвердить телефон</button>
                            </div>
                            <div class="form-group">
                                <div class="input-group">
                                    <label for="password1">Пароль</label>
                                    <div class="input-wrapper">
                                        <input type="password" id="password1" placeholder="" required>
                                        <button type="button" class="toggle-password">
                                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                                            <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
                                            <circle class="eye-open" cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                                            <path class="eye-closed" style="display:none" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="2"/>
                                            <line class="eye-closed" style="display:none" x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label for="password2">Пароль повторно</label>
                                    <div class="input-wrapper">
                                        <input type="password" id="password2" placeholder="" required>
                                        <button type="button" class="toggle-password">
                                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                                            <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
                                            <circle class="eye-open" cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                                            <path class="eye-closed" style="display:none" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="2"/>
                                            <line class="eye-closed" style="display:none" x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="checkbox-group">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox">
                                    <span class="custom-checkbox"></span>
                                    <span class="label-text">
                                        Я даю свое согласие на обработку моих персональных данных. <a href="#">Политика в отношении обработки персональных данных</a>.
                                    </span>
                                </label>
                                <label class="checkbox-wrapper">
                                    <input type="checkbox">
                                    <span class="custom-checkbox"></span>
                                    <span class="label-text">
                                        Я ознакомлен с <a href="#">пользовательским соглашением</a>.
                                    </span>
                                </label>
                            </div>
                            <div class="button-group">
                                <button type="submit" class="btn-primary">Зарегистрироваться</button>
                            </div>
                        </div>
                    </form>
                </div>
                <my-infoblock></my-infoblock>
            </div>
        </main>
        <div class="footer">
            <div class="container">
                <my-footer></my-footer>
            </div>
        </div>
    </div>
    <script src="./assets/js/main.js" defer></script>
</body>
</html>
